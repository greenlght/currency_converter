<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Currency Converter <br> by <a href="https://github.com/greenlght" title="github user">greenlght</a></h1>
    <h3>(as for 21.02.2026)</h3>
    <div id="whole_box">
        <div id="main_box">
            <input id="main_input" type="number">
            <select id="main_select">
                <option class="currency_option" value="USD">US Dollar</option>
                <option class="currency_option" value="EUR">Euro</option>
                <option class="currency_option" value="UZS">Uzbekistani Som</option>
                <option class="currency_option" value="GEL">Georgian Lari</option>
                <option class="currency_option" value="KGS">Kyrgyz som</option>
            </select>
        </div>
    </div>
    <button id="main_btn">Add</button>
    <script src="script.js"></script>
</body>
</html>
